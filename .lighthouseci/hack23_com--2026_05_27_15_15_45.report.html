nctions. [Learn more about ARIA roles and required parent element](https://dequeuniversity.com/rules/axe/4.10/aria-required-parent).",score:null,scoreDisplayMode:"notApplicable"},"aria-roles":{id:"aria-roles",title:"`[role]` values are valid",description:"ARIA roles must have valid values in order to perform their intended accessibility functions. [Learn more about valid ARIA roles](https://dequeuniversity.com/rules/axe/4.10/aria-roles).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-text":{id:"aria-text",title:"Elements with the `role=text` attribute do not have focusable descendents.",description:"Adding `role=text` around a text node split by markup enables VoiceOver to treat it as one phrase, but the element's focusable descendents will not be announced. [Learn more about the `role=text` attribute](https://dequeuniversity.com/rules/axe/4.10/aria-text).",score:null,scoreDisplayMode:"notApplicable"},"aria-toggle-field-name":{id:"aria-toggle-field-name",title:"ARIA toggle fields have accessible names",description:"When a toggle field doesn't have an accessible name, screen readers announce it with a generic name, making it unusable for users who rely on screen readers. [Learn more about toggle fields](https://dequeuniversity.com/rules/axe/4.10/aria-toggle-field-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-tooltip-name":{id:"aria-tooltip-name",title:"ARIA `tooltip` elements have accessible names",description:"When a tooltip element doesn't have an accessible name, screen readers announce it with a generic name, making it unusable for users who rely on screen readers. [Learn how to name `tooltip` elements](https://dequeuniversity.com/rules/axe/4.10/aria-tooltip-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-treeitem-name":{id:"aria-treeitem-name",title:"ARIA `treeitem` elements have accessible names",description:"When a `treeitem` element doesn't have an accessible name, screen readers announce it with nique",description:"The value of an ARIA ID must be unique to prevent other instances from being overlooked by assistive technologies. [Learn how to fix duplicate ARIA IDs](https://dequeuniversity.com/rules/axe/4.10/duplicate-id-aria).",score:null,scoreDisplayMode:"notApplicable"},"empty-heading":{id:"empty-heading",title:"All heading elements contain content.",description:"A heading with no content or inaccessible text prevent screen reader users from accessing information on the page's structure. [Learn more about headings](https://dequeuniversity.com/rules/axe/4.10/empty-heading).",score:null,scoreDisplayMode:"notApplicable"},"form-field-multiple-labels":{id:"form-field-multiple-labels",title:"No form fields have multiple labels",description:"Form fields with multiple labels can be confusingly announced by assistive technologies like screen readers which use either the first, the last, or all of the labels. [Learn how to use form labels](https://dequeuniversity.com/rules/axe/4.10/form-field-multiple-labels).",score:null,scoreDisplayMode:"notApplicable"},"frame-title":{id:"frame-title",title:"`<frame>` or `<iframe>` elements have a title",description:"Screen reader users rely on frame titles to describe the contents of frames. [Learn more about frame titles](https://dequeuniversity.com/rules/axe/4.10/frame-title).",score:null,scoreDisplayMode:"notApplicable"},"heading-order":{id:"heading-order",title:"Heading elements appear in a sequentially-descending order",description:"Properly ordered headings that do not skip levels convey the semantic structure of the page, making it easier to navigate and understand when using assistive technologies. [Learn more about heading order](https://dequeuniversity.com/rules/axe/4.10/heading-order).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"html-has-lang":{id:"html-has-lang",title:"`<html>` element has a `[lang]` attribute",description:"If a page doesn't specify a `lang` attribute, a screen reader assumes that the page is in the default language that the user chose when setting up the screen reader. If the page isn't actually in the default language, then the screen reader might not announce the page's text correctly. [Learn more about the `lang` attribute](https://dequeuniversity.com/rules/axe/4.10/html-has-lang).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"html-lang-valid":{id:"html-lang-valid",title:"`<html>` element has a valid value for its `[lang]` attribute",description:"Specifying a valid [BCP 47 language](https://www.w3.org/International/questions/qa-choosing-language-tags#question) helps screen readers announce text properly. [Learn how to use the `lang` attribute](https://dequeuniversity.com/rules/axe/4.10/html-lang-valid).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"html-xml-lang-mismatch":{id:"html-xml-lang-mismatch",title:"`<html>` element has an `[xml:lang]` attribute with the same base language as the `[lang]` attribute.",description:"If the webpage does not specify a consistent language, then the screen reader might not announce the page's text correctly. [Learn more about the `lang` attribute](https://dequeuniversity.com/rules/axe/4.10/html-xml-lang-mismatch).",score:null,scoreDisplayMode:"notApplicable"},"identical-links-same-purpose":{id:"identical-links-same-purpose",title:"Identical links have the same purpose.",description:"Links with the same destination should have the same description, to help users understand the link's purpose and decide whether to follow it. [Learn more about identical links](https://dequeuniversity.com/rules/axe/4.10/identical-links-same-purpose).",score:1,scoreDisplayMode:"informative",details:{type:"table",headings:[{key:"node",valueType:"node",subItemsHeading:{key:"relatedNode",valueType:"node"},label:"Failing Elements"}],items:[{node:{type:"node",lhId:"1-6-A",path:"1,HTML,1,BODY,3,HEADER,8,DIV,0,A",selector:"body > header > div.key mage-redundant-alt",title:"Image elements do not have `[alt]` attributes that are redundant text.",description:"Informative elements should aim for short, descriptive alternative text. Alternative text that is exactly the same as the text adjacent to the link or image is potentially confusing for screen reader users, because the text will be read twice. [Learn more about the `alt` attribute](https://dequeuniversity.com/rules/axe/4.10/image-redundant-alt).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"input-button-name":{id:"input-button-name",title:"Input buttons have discernible text.",description:"Adding discernable and accessible text to input buttons may help screen reader users understand the purpose of the input button. [Learn more about input buttons](https://dequeuniversity.com/rules/axe/4.10/input-button-name).",score:null,scoreDisplayMode:"notApplicable"},"input-image-alt":{id:"input-image-alt",title:'`<input type="image">` elements have `[alt]` text',description:"When an image is being used as an `<input>` button, providing alternative text can help screen reader users understand the purpose of the button. [Learn about input image alt text](https://dequeuniversity.com/rules/axe/4.10/input-image-alt).",score:null,scoreDisplayMode:"notApplicable"},"label-content-name-mismatch":{id:"label-content-name-mismatch",title:"Elements with visible text labels have matching accessible names.",description:"Visible text labels that do not match the accessible name can result in a confusing experience for screen reader users. [Learn more about accessible names](https://dequeuniversity.com/rules/axe/4.10/label-content-name-mismatch).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},label:{id:"label",title:"Form elements have associated labels",description:"Labels ensure that form controls are announced properly by assistive technologies, like screen readers. [Learn more about form element labels](https://dequeuniversity.com/rules/axe/4.10/label).",score:null,scoreDisplayMode:"notApplicable"},"landmark-one-main":{id:"landmark-one-main",title:"Document has a main landmark.",description:"One main landmark helps screen reader users navigate a web page. [Learn more about landmarks](https://dequeuniversity.com/rules/axe/4.10/landmark-one-main).",score:null,scoreDisplayMode:"notApplicable"},"link-name":{id:"link-name",title:"Links have a discernible name",description:"Link text (and alternate text for images, when used as links) that is discernible, unique, and focusable improves the navigation experience for screen reader users. [Learn how to make links accessible](https://dequeuniversity.com/rules/axe/4.10/link-name).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"link-in-text-block":{id:"link-in-text-block",title:"Links are distinguishable without relying on color.",description:"Low-contrast text is difficult or impossible for many users to read. Link text that is discernible improves the experience for users with low vision. [Learn how to make links distinguishable](https://dequeuniversity.com/rules/axe/4.10/link-in-text-block).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},list:{id:"list",title:"Lists contain only `<li>` elements and script supporting elements (`<script>` and `<template>`).",description:"Screen readers have a specific way of announcing lists. Ensuring proper list structure aids screen reader output. [Learn more about proper list structure](https://dequeuniversity.com/rules/axe/4.10/list).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},listitem:{id:"listitem",title:"List items (`<li>`) are contained within `<ul>`, `<ol>` or `<menu>` parent elements",description:"Screen readers require list items (`<li>`) to be contained within a parent `<ul>`, `<ol>` or `<menu>` to be announced properly. [Learn more about proper list structure](https://dequeuniversity.com/rules/axe/4.10/listitem).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"meta-refresh":{id:"meta-refresh",title:'The document does not use `<meta http-equiv="refresh">`',description:"Users do not expect a page to refresh automatically, and doing so will move focus back to the top of the page. This may create a frustrating or confusing experience. [Learn more about the refresh meta tag](https://dequeuniversity.com/rules/axe/4.10/meta-refresh).",score:null,scoreDisplayMode:"notApplicable"},"meta-viewport":{id:"meta-viewport",title:'`[user-scalable="no"]` is not used in the `<meta name="viewport">` element and the `[maximum-scale]` attribute is not less than 5.',description:"Disabling zooming is problematic for users with low vision who rely on screen magnification to properly see the contents of a web page. [Learn more about the viewport meta tag](https://dequeuniversity.com/rules/axe/4.10/meta-viewport).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"object-alt":{id:"object-alt",title:"`<object>` elements have alternate text",description:"Screen readers cannot translate non-text content. Adding alternate text to `<object>` elements helps screen readers convey meaning to users. [Learn more about alt text for `object` elements](https://dequeuniversity.com/rules/axe/4.10/object-alt).",score:null,scoreDisplayMode:"notApplicable"},"select-name":{id:"select-name",title:"Select elements have associated label elements.",description:"Form elements without effective labels can create frustrating experiences for screen reader users. [Learn more about the `select` element](https://dequeuniversity.com/rules/axe/4.10/select-name).",score:null,scoreDisplayMode:"notApplicable"},"skip-link":{id:"skip-link",title:"Skip links are focusable.",description:"Including a skip link can help users skip to the main content to save time. [Learn more about skip links](https://dequeuniversity.com/rules/axe/4.10/skip-link).",sco {\n    justify-self: end;\n    grid-column-start: unset;\n  }\n}\n\n/* No-JS toggle switch */\n/* Keep this selector sync\'d w/ `magicSelector` in report-ui-features-test.js */\n .lh-metrics-toggle__input:checked ~ .lh-metrics-container .lh-metric__description {\n  display: block;\n}\n\n/* TODO get rid of the SVGS and clean up these some more */\n.lh-metrics-toggle__input {\n  opacity: 0;\n  position: absolute;\n  right: 0;\n  top: 0px;\n}\n\n.lh-metrics-toggle__input + div > label > .lh-metrics-toggle__labeltext--hide,\n.lh-metrics-toggle__input:checked + div > label > .lh-metrics-toggle__labeltext--show {\n  display: none;\n}\n.lh-metrics-toggle__input:checked + div > label > .lh-metrics-toggle__labeltext--hide {\n  display: inline;\n}\n.lh-metrics-toggle__input:focus + div > label {\n  outline: -webkit-focus-ring-color auto 3px;\n}\n\n.lh-metrics-toggle__label {\n  cursor: pointer;\n  font-size: var(--report-font-size-secondary);\n  line-height: var(--report-line-height-secondary);\n  color: var(--color-gray-700);\n}\n\n/* Pushes the metric description toggle button to the right. */\n.lh-audit-group--metrics .lh-audit-group__header {\n  display: flex;\n  justify-content: space-between;\n}\n\n.lh-metric__icon,\n.lh-scorescale-range::before {\n  content: \'\';\n  width: var(--score-icon-size);\n  height: var(--score-icon-size);\n  display: inline-block;\n  margin: var(--score-icon-margin);\n}\n\n.lh-metric--pass .lh-metric__value {\n  color: var(--color-pass-secondary);\n}\n.lh-metric--pass .lh-metric__icon {\n  border-radius: 100%;\n  background: var(--color-pass);\n}\n\n.lh-metric--average .lh-metric__value {\n  color: var(--color-average-secondary);\n}\n.lh-metric--average .lh-metric__icon {\n  background: var(--color-average);\n  width: var(--icon-square-size);\n  height: var(--icon-square-size);\n}\n\n.lh-metric--fail .lh-metric__value {\n  color: var(--color-fail-secondary);\n}\n.lh-metric--fail .lh-metric__icon {\n  border-left: calc(var(--score-icon-size) /
