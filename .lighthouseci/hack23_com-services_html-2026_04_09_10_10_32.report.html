esskeys:{id:"accesskeys",title:"`[accesskey]` values are unique",description:"Access keys let users quickly focus a part of the page. For proper navigation, each access key must be unique. [Learn more about access keys](https://dequeuniversity.com/rules/axe/4.10/accesskeys).",score:null,scoreDisplayMode:"notApplicable"},"aria-allowed-attr":{id:"aria-allowed-attr",title:"`[aria-*]` attributes match their roles",description:"Each ARIA `role` supports a specific subset of `aria-*` attributes. Mismatching these invalidates the `aria-*` attributes. [Learn how to match ARIA attributes to their roles](https://dequeuniversity.com/rules/axe/4.10/aria-allowed-attr).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-allowed-role":{id:"aria-allowed-role",title:"Uses ARIA roles only on compatible elements",description:"Many HTML elements can only be assigned certain ARIA roles. Using ARIA roles where they are not allowed can interfere with the accessibility of the web page. [Learn more about ARIA roles](https://dequeuniversity.com/rules/axe/4.10/aria-allowed-role).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-command-name":{id:"aria-command-name",title:"`button`, `link`, and `menuitem` elements have accessible names",description:"When an element doesn't have an accessible name, screen readers announce it with a generic name, making it unusable for users who rely on screen readers. [Learn how to make command elements more accessible](https://dequeuniversity.com/rules/axe/4.10/aria-command-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-conditional-attr":{id:"aria-conditional-attr",title:"ARIA attributes are used as specified for the element's role",description:"Some ARIA attributes are only allowed on an element under certain conditions. [Learn more about conditional ARIA attributes](https://dequeuniversity.com/rules/axe/4.10/aria-conditional-attr).",score:1,scoreDisplayMode:"binary",details:{  rely on screen readers. [Learn more about input field labels](https://dequeuniversity.com/rules/axe/4.10/aria-input-field-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-meter-name":{id:"aria-meter-name",title:"ARIA `meter` elements have accessible names",description:"When a meter element doesn't have an accessible name, screen readers announce it with a generic name, making it unusable for users who rely on screen readers. [Learn how to name `meter` elements](https://dequeuniversity.com/rules/axe/4.10/aria-meter-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-progressbar-name":{id:"aria-progressbar-name",title:"ARIA `progressbar` elements have accessible names",description:"When a `progressbar` element doesn't have an accessible name, screen readers announce it with a generic name, making it unusable for users who rely on screen readers. [Learn how to label `progressbar` elements](https://dequeuniversity.com/rules/axe/4.10/aria-progressbar-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-prohibited-attr":{id:"aria-prohibited-attr",title:"Elements use only permitted ARIA attributes",description:"Using ARIA attributes in roles where they are prohibited can mean that important information is not communicated to users of assistive technologies. [Learn more about prohibited ARIA roles](https://dequeuniversity.com/rules/axe/4.10/aria-prohibited-attr).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-required-attr":{id:"aria-required-attr",title:"`[role]`s have all required `[aria-*]` attributes",description:"Some ARIA roles have required attributes that describe the state of the element to screen readers. [Learn more about roles and required attributes](https://dequeuniversity.com/rules/axe/4.10/aria-required-attr).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-required-children":{id:"aria-required-children",title:"Elements with an ARIA `[role]` that require children to contain a specific `[role]` have all required children.",description:"Some ARIA parent roles must contain specific child roles to perform their intended accessibility functions. [Learn more about roles and required children elements](https://dequeuniversity.com/rules/axe/4.10/aria-required-children).",score:null,scoreDisplayMode:"notApplicable"},"aria-required-parent":{id:"aria-required-parent",title:"`[role]`s are contained by their required parent element",description:"Some ARIA child roles must be contained by specific parent roles to properly perform their intended accessibility functions. [Learn more about ARIA roles and required parent element](https://dequeuniversity.com/rules/axe/4.10/aria-required-parent).",score:null,scoreDisplayMode:"notApplicable"},"aria-roles":{id:"aria-roles",title:"`[role]` values are valid",description:"ARIA roles must have valid values in order to perform their intended accessibility functions. [Learn more about valid ARIA roles](https://dequeuniversity.com/rules/axe/4.10/aria-roles).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-text":{id:"aria-text",title:"Elements with the `role=text` attribute do not have focusable descendents.",description:"Adding `role=text` around a text node split by markup enables VoiceOver to treat it as one phrase, but the element's focusable descendents will not be announced. [Learn more about the `role=text` attribute](https://dequeuniversity.com/rules/axe/4.10/aria-text).",score:null,scoreDisplayMode:"notApplicable"},"aria-toggle-field-name":{id:"aria-toggle-field-name",title:"ARIA toggle fields have accessible names",description:"When a toggle field doesn't have an accessible name, screen readers announce it with a generic name, making it unusable for users who rely on screen readers. [Learn more about toggle fields](https://dequeuniversity.com/rules/axe/4.10/aria-toggle-field-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-tooltip-name":{id:"aria-tooltip-name",title:"ARIA `tooltip` elements have accessible names",description:"When a tooltip element doesn't have an accessible name, screen readers announce it with a generic name, making it unusable for users who rely on screen readers. [Learn how to name `tooltip` elements](https://dequeuniversity.com/rules/axe/4.10/aria-tooltip-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-treeitem-name":{id:"aria-treeitem-name",title:"ARIA `treeitem` elements have accessible names",description:"When a `treeitem` element doesn't have an accessible name, screen readers announce it with a generic name, making it unusable for users who rely on screen readers. [Learn more about labeling `treeitem` elements](https://dequeuniversity.com/rules/axe/4.10/aria-treeitem-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-valid-attr-value":{id:"aria-valid-attr-value",title:"`[aria-*]` attributes have valid values",description:"Assistive technologies, like screen readers, can't interpret ARIA attributes with invalid values. [Learn more about valid values for ARIA attributes](https://dequeuniversity.com/rules/axe/4.10/aria-valid-attr-value).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-valid-attr":{id:"aria-valid-attr",title:"`[aria-*]` attributes are valid and not misspelled",description:"Assistive technologies, like screen readers, can't interpret ARIA attributes with invalid names. [Learn more about valid ARIA attributes](https://dequeuniversity.com/rules/axe/4.10/aria-valid-attr).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"button-name":{id:"button-name",title:"Buttons have an accessible name",description:'When a button doesn\'t have an accessible name, screen readers announce it as "button", making it unusable for users who rely on screen readers. [Learn how to make buttons more accessible](https://dequeuniversity.com/rules/axe/4.10/button-name).',score:null,scoreDisplayMode:"notApplicable"},bypass:{id:"bypass",title:"The page contains a heading, skip link, or landmark region",description:"Adding ways to bypass repetitive content lets keyboard users navigate the page more efficiently. [Learn more about bypass blocks](https://dequeuniversity.com/rules/axe/4.10/bypass).",score:null,scoreDisplayMode:"notApplicable"},"color-contrast":{id:"color-contrast",title:"Background and foreground colors have a sufficient contrast ratio",description:"Low-contrast text is difficult or impossible for many users to read. [Learn how to provide sufficient color contrast](https://dequeuniversity.com/rules/axe/4.10/color-contrast).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"definition-list":{id:"definition-list",title:"`<dl>`'s contain only properly-ordered `<dt>` and `<dd>` groups, `<script>`, `<template>` or `<div>` elements.",description:"When definition lists are not properly marked up, screen readers may produce confusing or inaccurate output. [Learn how to structure definition lists correctly](https://dequeuniversity.com/rules/axe/4.10/definition-list).",score:null,scoreDisplayMode:"notApplicable"},dlitem:{id:"dlitem",title:"Definition list items are wrapped in `<dl>` elements",description:"Definition list items (`<dt>` and `<dd>`) must be wrapped in a parent `<dl>` element to ensure that screen readers can properly announce them. [Learn how to structure definition lists correctly](https://dequeuniversity.com/rules/axe/4.10/dlitem).",score:null,scoreDisplayMode:"notApplicable"},"document-title":{id:"document-title",title:"Document has a `<title>` element",description:"The title gives screen reader users an overview of the page, and search engine users rely on it heavily to determine if a page is relevant to their search. [Learn more about document titles](https://dequeuniversity.com/rules/axe/4.10/document-title).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"duplicate-id-aria":{id:"duplicate-id-aria",title:"ARIA IDs are unique",description:"The value of an ARIA ID must be unique to prevent other instances from being overlooked by assistive technologies. [Learn how to fix duplicate ARIA IDs](https://dequeuniversity.com/rules/axe/4.10/duplicate-id-aria).",score:null,scoreDisplayMode:"notApplicable"},"empty-heading":{id:"empty-heading",title:"All heading elements contain content.",description:"A heading with no content or inaccessible text prevent screen reader users from accessing information on the page's structure. [Learn more about headings](https://dequeuniversity.com/rules/axe/4.10/empty-heading).",score:null,scoreDisplayMode:"notApplicable"},"form-field-multiple-labels":{id:"form-field-multiple-labels",title:"No form fields have multiple labels",description:"Form fields with multiple labels can be confusingly announced by assistive technologies like screen readers which use either the first, the last, or all of the labels. [Learn how to use form labels](https://dequeuniversity.com/rules/axe/4.10/form-field-multiple-labels).",score:null,scoreDisplayMode:"notApplicable"},"frame-title":{id:"frame-title",title:"`<frame>` or `<iframe>` elements have a title",description:"Screen reader users rely on frame titles to describe the contents of frames. [Learn more about frame titles](https://dequeuniversity.com/rules/axe/4.10/frame-title).",score:null,scoreDisplayMode:"notApplicable"},"heading-order":{id:"heading-order",title:"Heading elements appear in a sequentially-descending order",description:"Properly ordered headings that do not skip levels convey the semantic structure of the page, making it easier to navigate and understand when using assistive technologies. [Learn more about heading order](https://dequeuniversity.com/rules/axe/4.10/heading-order).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"html-has-lang":{id:"html-has-lang",title:"`<html>` element has a `[lang]` attribute",description:"If a page doesn't specify a `lang` attribute, a screen reader assumes that the page is in the default language that the user chose when setting up the screen reader. If the page isn't actually in the default language, then the screen reader might not announce the page's text correctly. [Learn more about the `lang` attribute](https://dequeuniversity.com/rules/axe/4.10/html-has-lang).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"html-lang-valid":{id:"html-lang-valid",title:"`<html>` element has a valid value for its `[lang]` attribute",description:"Specifying a valid [BCP 47 language](https://www.w3.org/International/questions/qa-choosing-language-tags#question) helps screen readers announce text properly. [Learn how to use the `lang` attribute](https://dequeuniversity.com/rules/axe/4.10/html-lang-valid).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"html-xml-lang-mismatch":{id:"html-xml-lang-mismatch",title:"`<html>` element has an `[xml:lang]` attribute with the same base language as the `[lang]` attribute.",description:"If the webpage does not specify a consistent language, then the screen reader might not announce the page's text correctly. [Learn more about the `lang` attribute](https://dequeuniversity.com/rules/axe/4.10/html-xml-lang-mismatch).",score:null,scoreDisplayMode:"notApplicable"},"identical-links-same-purpose":{id:"identical-links-same-purpose",title:"Identical links have the same purpose.",description:"Links with the same destination should have the same description, to help users understand the link's purpose and decide whether to follow it. [Learn more about identical links](https://dequeuniversity.com/rules/axe/4.10/identical-links-same-purpose).",score:1,scoreDisplayMode:"informative",details:{type:"table",headings:[{key:"node",valueType:"node",subItemsHeading:{key:"relatedNode",valueType:"node"},label:"Failing Elements"}],items:[{node:{type:"node",lhId:"1-2-A",path:"1,HTML,1,BODY,0,MAIN,1,SECTION,4 he input button. [Learn more about input buttons](https://dequeuniversity.com/rules/axe/4.10/input-button-name).",score:null,scoreDisplayMode:"notApplicable"},"input-image-alt":{id:"input-image-alt",title:'`<input type="image">` elements have `[alt]` text',description:"When an image is being used as an `<input>` button, providing alternative text can help screen reader users understand the purpose of the button. [Learn about input image alt text](https://dequeuniversity.com/rules/axe/4.10/input-image-alt).",score:null,scoreDisplayMode:"notApplicable"},"label-content-name-mismatch":{id:"label-content-name-mismatch",title:"Elements with visible text labels have matching accessible names.",description:"Visible text labels that do not match the accessible name can result in a confusing experience for screen reader users. [Learn more about accessible names](https://dequeuniversity.com/rules/axe/4.10/label-content-name-mismatch).",score:null,scoreDisplayMode:"notApplicable"},label:{id:"label",title:"Form elements have associated labels",description:"Labels ensure that form controls are announced properly by assistive technologies, like screen readers. [Learn more about form element labels](https://dequeuniversity.com/rules/axe/4.10/label).",score:null,scoreDisplayMode:"notApplicable"},"landmark-one-main":{id:"landmark-one-main",title:"Document has a main landmark.",description:"One main landmark helps screen reader users navigate a web page. [Learn more about landmarks](https://dequeuniversity.com/rules/axe/4.10/landmark-one-main).",score:null,scoreDisplayMode:"notApplicable"},"link-name":{id:"link-name",title:"Links have a discernible name",description:"Link text (and alternate text for images, when used as links) that is discernible, unique, and focusable improves the navigation experience for screen reader users. [Learn how to make links accessible](https://dequeuniversity.com/rules/axe/4.10/link-name).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"link-in-text-block":{id:"link-in-text-block",title:"Links are distinguishable without relying on color.",description:"Low-contrast text is difficult or impossible for many users to read. Link text that is discernible improves the experience for users with low vision. [Learn how to make links distinguishable](https://dequeuniversity.com/rules/axe/4.10/link-in-text-block).",score:null,scoreDisplayMode:"notApplicable"},list:{id:"list",title:"Lists contain only `<li>` elements and script supporting elements (`<script>` and `<template>`).",description:"Screen readers have a specific way of announcing lists. Ensuring proper list structure aids screen reader output. [Learn more about proper list structure](https://dequeuniversity.com/rules/axe/4.10/list).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},listitem:{id:"listitem",title:"List items (`<li>`) are contained within `<ul>`, `<ol>` or `<menu>` parent elements",description:"Screen readers require list items (`<li>`) to be contained within a parent `<ul>`, `<ol>` or `<menu>` to be announced properly. [Learn more about proper list structure](https://dequeuniversity.com/rules/axe/4.10/listitem).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"meta-refresh":{id:"meta-refresh",title:'The document does not use `<meta http-equiv="refresh">`',description:"Users do not expect a page to refresh automatically, and doing so will move focus back to the top of the page. This may create a frustrating or confusing experience. [Learn more about the refresh meta tag](https://dequeuniversity.com/rules/axe/4.10/meta-refresh).",score:null,scoreDisplayMode:"notApplicable"},"meta-viewport":{id:"meta-viewport",title:'`[user-scalable="no"]` is not used in the `<meta name="viewport">` element and the `[maximum-scale]` attribute is not less than 5.',description:"Disabling zooming is problematic for users with low vision who rely on screen magnification to properly see the contents of a web page. [Learn more about the viewport meta tag](https://dequeuniversity.com/rules/axe/4.10/meta-viewport).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"object-alt":{id:"object-alt",title:"`<object>` elements have alternate text",description:"Screen readers cannot translate non-text content. Adding alternate text to `<object>` elements helps screen readers convey meaning to users. [Learn more about alt text for `object` elements](https://dequeuniversity.com/rules/axe/4.10/object-alt).",score:null,scoreDisplayMode:"notApplicable"},"select-name":{id:"select-name",title:"Select elements have associated label elements.",description:"Form elements without effective labels can create frustrating experiences for screen reader users. [Learn more about the `select` element](https://dequeuniversity.com/rules/axe/4.10/select-name).",score:null,scoreDisplayMode:"notApplicable"},"skip-link":{id:"skip-link",title:"Skip links are focusable.",description:"Including a skip link can help users skip to the main content to save time. [Learn more about skip links](https://dequeuniversity.com/rules/axe/4.10/skip-link).",score:null,scoreDisplayMode:"notApplicable"},tabindex:{id:"tabindex",title:"No element has a `[tabindex]` value greater than 0",description:"A value greater than 0 implies an explicit navigation ordering. Although technically valid, this often creates frustrating experiences for users who rely on assistive technologies. [Learn more about the `tabindex` attribute](https://dequeuniversity.com/rules/axe/4.10/tabindex).",score:null,scoreDisplayMode:"notApplicable"},"table-duplicate-name":{id:"table-duplicate-name",title:"Tables have different content in the summary attribute and `<caption>`.",description:"The summary attribute should describe the table structure, while `<caption>` should have the onscreen title. Accurate table mark-up helps users of screen readers. [Learn more about summary and caption](https://dequeuniversity.com/rules/axe/4.10/table-duplicate-name).",score:null,scoreDisplayMode:"notApplicable"},"table-fake-caption":{id:"table-fake-caption",title:"Tables use `<caption>` instead of cells with the `[colspan]` attribute to indicate a caption.",description:"Screen readers have features to make navigating tables easier. Ensuring that tables use the actual caption element instead of cells with the `[colspan]` attribute may improve the experience for screen reader users. [Learn more about captions](https://dequeuniversity.com/rules/axe/4.10/table-fake-caption).",score:null,scoreDisplayMode:"notApplicable"},"target-size":{id:"target-size",title:"Touch targets have sufficient size and spacing.",description:"Touch targets with sufficient size and spacing help users who may have difficulty targeting small controls to activate the targets. [Learn more about touch targets](https://dequeuniversity.com/rules/axe/4.10/target-size).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"td-has-header":{id:"td-has-header",title:"`<td>` elements in a large `<table>` have one or more table headers.",description:"Screen readers have features to make navigating tables easier. Ensuring that `<td>` elements in a large table (3 or more cells in width and height) have an associated table header may improve the experience for screen reader users. [Learn more about table headers](https://dequeuniversity.com/rules/axe/4.10/td-has-header).",score:null,scoreDisplayMode:"notApplicable"},"td-headers-attr":{id:"td-headers-attr",title:"Cells in a `<table>` element that use the `[headers]` attribute refer to table cells within the same table.",description:"Screen readers have features to make navigating tables easier. Ensuring `<td>` cells using the `[headers]` attribute only refer to other cells in the same table may improve the experience for screen reader users. [Learn more about the `headers` attribute](https://dequeuniversity.com/rules/axe/4.10/td-headers-attr).",score:null,scoreDisplayMode:"notApplicable"},"th-has-data-cells":{id:"th-has-data-cells",title:'`<th>` elements and elements with `[role="columnheader"/"rowheader"]` have data cells they describe.',description:"Screen readers have features to make navigating tables easier. Ensuring table headers always refer to some set of cells may improve the experience for screen reader users. [Learn more about table headers](https://dequeuniversity.com/rules/axe/4.10/th-has-data-cells).",score:null,scoreDisplayMode:"notApplicable"},"valid-lang":{id:"valid-lang",title:"`[lang]` attributes have a valid value",description:"Specifying a valid [BCP 47 language](https://www.w3.org/International/questions/qa-choosing-language-tags#question) on elements helps ensure that text is pronounced correctly by a screen reader. [Learn how to use the `lang` attribute](https://dequeuniversity.com/rules/axe/4.10/valid-lang).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"video-caption":{id:"video-caption",title:'`<video>` elements contain a `<track>` element with `[kind="captions"]`',description:"When a video provides a caption it is easier for deaf and hearing impaired users to access its information. [Learn more about video captions](https://dequeuniversity.com/rules/axe/4.10/video-caption).",score:null,scoreDisplayMode:"notApplicable"},"custom-controls-labels":{id:"custom-controls-labels",title:"Custom controls have associated labels",description:"Custom interactive controls have associated labels, provided by aria-label or aria-labelledby. [Learn more about custom controls and labels](https://developer.chrome.com/docs/lighthouse/accessibility/custom-controls-labels/).",score:null,scoreDisplayMode:"manual"},"custom-controls-roles":{id:"custom-controls-roles",title:"Custom controls have ARIA roles",description:"Custom interactive controls have appropriate ARIA roles. [Learn how to add roles to custom controls](https://developer.chrome.com/docs/lighthouse/accessibil background: var(--color-pass);\n}\n\n.lh-audit--average .lh-audit__display-text {\n  color: var(--color-average-secondary);\n}\n.lh-audit--average .lh-audit__score-icon,\n.lh-scorescale-range--average::before {\n  background: var(--color-average);\n  width: var(--icon-square-size);\n  height: var(--icon-square-size);\n}\n\n.lh-audit--fail .lh-audit__display-text {\n  color: var(--color-fail-secondary);\n}\n.lh-audit--fail .lh-audit__score-icon,\n.lh-audit--error .lh-audit__score-icon,\n.lh-scorescale-range--fail::before {\n  border-left: calc(var(--score-icon-size) / 2) solid transparent;\n  border-right: calc(var(--score-icon-size) / 2) solid transparent;\n  border-bottom: var(--score-icon-size) solid var(--color-fail);\n}\n\n.lh-audit--error .lh-audit__score-icon,\n.lh-metric--error .lh-metric__icon {\n  background-image: var(--error-icon-url);\n  background-repeat: no-repeat;\n  background-position: center;\n  border: none;\n}\n\n.lh-gauge__wrapper--fail .lh-gauge--error {\n  background-image: var(--error-icon-url);\n  background-repeat: no-repeat;\n  background-position: center;\n  transform: scale(0.5);\n  top: var(--score-container-padding);\n}\n\n.lh-audit--manual .lh-audit__display-text,\n.lh-audit--notapplicable .lh-audit__display-text {\n  color: var(--color-gray-600);\n}\n.lh-audit--manual .lh-audit__score-icon,\n.lh-audit--notapplicable .lh-audit__score-icon {\n  border: calc(0.2 * var(--score-icon-size)) solid var(--color-gray-400);\n  border-radius: 100%;\n  background: none;\n}\n\n.lh-audit--informative .lh-audit__display-text {\n  color: var(--color-gray-600);\n}\n\n.lh-audit--informative .lh-audit__score-icon {\n  border: calc(0.2 * var(--score-icon-size)) solid var(--color-gray-400);\n  border-radius: 100%;\n}\n\n.lh-audit__description,\n.lh-audit__stackpack {\n  color: var(--report-text-color-secondary);\n}\n.lh-audit__adorn {\n  border: 1px solid var(--color-gray-500);\n  border-radius: 3px;\n  margin: 0 3px;\n  padding: 0 2px;\n  line-height: 1.1;\n  display: inline-block;\n  font-size: 90%;\n  color: var(--report-text-color-secondary);\n}\n\n.lh-category-header__description  {\n  text-align: center;\n  color: var(--color-gray-700);\n  margin: 0px auto;\n  max-width: 400px;\n}\n\n\n.lh-audit__display-text,\n.lh-chevron-container {\n  margin: 0 var(--audit-margin-horizontal);\n}\n.lh-chevron-container {\n  margin-right: 0;\n}\n\n.lh-audit__title-and-text {\n  flex: 1;\n}\n\n.lh-audit__title-and-text code {\n  color: var(--snippet-color);\n  font-size: var(--report-monospace-font-size);\n}\n\n/* Prepend display text with em dash separator. */\n.lh-audit__display-text:not(:empty):before {\n  content: \'—\';\n  margin-right: var(--audit-margin-horizontal);\n}\n\n/* Expandable Details (Audit Groups, Audits) */\n.lh-audit__header {\n  display: flex;\n  align-items: center;\n  padding: var(--default-padding);\n}\n\n\n.lh-metricfilter {\n  display: grid;\n  justify-content: end;\n  align-items: center;\n  grid-auto-flow: column;\n  gap: 4px;\n  color: var(--color-gray-700);\n}\n\n.lh-metricfilter__radio {\n  /*\n   * Instead of hiding, position offscreen so it\'s still accessible to screen readers\n   * https://bugs.chromium.org/p/chromium/issues/detail?id=1439785\n   */\n  position: fixed;\n  left: -9999px;\n}\n.lh-metricfilter input[type=\'radio\']:focus-visible + label {\n  outline: -webkit-focus-ring-color auto 1px;\n}\n\n.lh-metricfilter__label {\n  display: inline-flex;\n  padding: 0 4px;\n  height: 16px;\n  text-decoration: underline;\n  align-items: center;\n  cursor: pointer;\n  font-size: 90%;\n}\n\n.lh-metricfilter__label--active {\n  background: var(--color-blue-primary);\n  color: var(--color-white);\n  border-radius: 3px;\n  text-decoration: none;\n}\n/* Give the \'All\' choice a more muted display */\n.lh-metricfilter__label--active[for="metric-All"] {\n  background-color: var(--color-blue-200) !important;\n  color: black !important;\n}\n\n.lh-metricfilter__text {\n  margin-right: 8px;\n}\n\n/* If a
