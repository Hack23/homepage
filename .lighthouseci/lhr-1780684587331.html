ders. [Learn how to make command elements more accessible](https://dequeuniversity.com/rules/axe/4.10/aria-command-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-conditional-attr":{id:"aria-conditional-attr",title:"ARIA attributes are used as specified for the element's role",description:"Some ARIA attributes are only allowed on an element under certain conditions. [Learn more about conditional ARIA attributes](https://dequeuniversity.com/rules/axe/4.10/aria-conditional-attr).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-deprecated-role":{id:"aria-deprecated-role",title:"Deprecated ARIA roles were not used",description:"Deprecated ARIA roles may not be processed correctly by assistive technology. [Learn more about deprecated ARIA roles](https://dequeuniversity.com/rules/axe/4.10/aria-deprecated-role).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-dialog-name":{id:"aria-dialog-name",title:'Elements with `role="dialog"` or `role="alertdialog"` have accessible names.',description:"ARIA dialog elements without accessible names may prevent screen readers users from discerning the purpose of these elements. [Learn how to make ARIA dialog elements more accessible](https://dequeuniversity.com/rules/axe/4.10/aria-dialog-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-hidden-body":{id:"aria-hidden-body",title:'`[aria-hidden="true"]` is not present on the document `<body>`',description:'Assistive technologies, like screen readers, work inconsistently when `aria-hidden="true"` is set on the document `<body>`. [Learn how `aria-hidden` affects the document body](https://dequeuniversity.com/rules/axe/4.10/aria-hidden-body).',score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-hidden-focus":{id:"aria-hidden-focus",title:'`[aria-hidden="true"]` elements do not contain focusable descendents',description:'Focusable descendents within an `[aria-hidden="true"]` element prevent those interactive elements from being available to users of assistive technologies like screen readers. [Learn how `aria-hidden` affects focusable elements](https://dequeuniversity.com/rules/axe/4.10/aria-hidden-focus).',score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-input-field-name":{id:"aria-input-field-name",title:"ARIA input fields have accessible names",description:"When an input field doesn't have an accessible name, screen readers announce it with a generic name, making it unusable for users who rely on screen readers. [Learn more about input field labels](https://dequeuniversity.com/rules/axe/4.10/aria-input-field-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-meter-name":{id:"aria-meter-name",title:"ARIA `meter` elements have accessible names",description:"When a meter element doesn't have an accessible name, screen readers announce it with a generic name, making it unusable for users who rely on screen readers. [Learn how to name `meter` elements](https://dequeuniversity.com/rules/axe/4.10/aria-meter-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-progressbar-name":{id:"aria-progressbar-name",title:"ARIA `progressbar` elements have accessible names",description:"When a `progressbar` element doesn't have an accessible name, screen readers announce it with a generic name, making it unusable for users who rely on screen readers. [Learn how to label `progressbar` elements](https://dequeuniversity.com/rules/axe/4.10/aria-progressbar-name).",score:null,scoreDisplayMode:"notApplicable"},"aria-prohibited-attr":{id:"aria-prohibited-attr",title:"Elements use only permitted ARIA attributes",description:"Using ARIA attributes in roles where they are prohibited can mean that important information is not communicated to users of assistive technologies. [Learn more about prohibited ARIA roles](https://dequeuniversity.com/rules/axe/4.10/aria-prohibited-attr).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-required-attr":{id:"aria-required-attr",title:"`[role]`s have all required `[aria-*]` attributes",description:"Some ARIA roles have required attributes that describe the state of the element to screen readers. [Learn more about roles and required attributes](https://dequeuniversity.com/rules/axe/4.10/aria-required-attr).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-required-children":{id:"aria-required-children",title:"Elements with an ARIA `[role]` that require children to contain a specific `[role]` have all required children.",description:"Some ARIA parent roles must contain specific child roles to perform their intended accessibility functions. [Learn more about roles and required children elements](https://dequeuniversity.com/rules/axe/4.10/aria-required-children).",score:null,scoreDisplayMode:"notApplicable"},"aria-required-parent":{id:"aria-required-parent",title:"`[role]`s are contained by their required parent element",description:"Some ARIA child roles must be contained by specific parent roles to properly perform their intended accessibility functions. [Learn more about ARIA roles and required parent element](https://dequeuniversity.com/rules/axe/4.10/aria-required-parent).",score:null,scoreDisplayMode:"notApplicable"},"aria-roles":{id:"aria-roles",title:"`[role]` values are valid",description:"ARIA roles must have valid values in order to perform their intended accessibility functions. [Learn more about valid ARIA roles](https://dequeuniversity.com/rules/axe/4.10/aria-roles).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"aria-text":{id:"aria-text",title:"Elements with the `role=text` attribute do not have focusable descendents.",description:"Adding `role=text` around a text node split by markup enables VoiceOver to treat it as one phrase, but the element's focusable descendents will not be announced. [Learn more about th iv>` elements.",description:"When definition lists are not properly marked up, screen readers may produce confusing or inaccurate output. [Learn how to structure definition lists correctly](https://dequeuniversity.com/rules/axe/4.10/definition-list).",score:null,scoreDisplayMode:"notApplicable"},dlitem:{id:"dlitem",title:"Definition list items are wrapped in `<dl>` elements",description:"Definition list items (`<dt>` and `<dd>`) must be wrapped in a parent `<dl>` element to ensure that screen readers can properly announce them. [Learn how to structure definition lists correctly](https://dequeuniversity.com/rules/axe/4.10/dlitem).",score:null,scoreDisplayMode:"notApplicable"},"document-title":{id:"document-title",title:"Document has a `<title>` element",description:"The title gives screen reader users an overview of the page, and search engine users rely on it heavily to determine if a page is relevant to their search. [Learn more about document titles](https://dequeuniversity.com/rules/axe/4.10/document-title).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"duplicate-id-aria":{id:"duplicate-id-aria",title:"ARIA IDs are unique",description:"The value of an ARIA ID must be unique to prevent other instances from being overlooked by assistive technologies. [Learn how to fix duplicate ARIA IDs](https://dequeuniversity.com/rules/axe/4.10/duplicate-id-aria).",score:null,scoreDisplayMode:"notApplicable"},"empty-heading":{id:"empty-heading",title:"All heading elements contain content.",description:"A heading with no content or inaccessible text prevent screen reader users from accessing information on the page's structure. [Learn more about headings](https://dequeuniversity.com/rules/axe/4.10/empty-heading).",score:null,scoreDisplayMode:"notApplicable"},"form-field-multiple-labels":{id:"form-field-multiple-labels",title:"No form fields have multiple labels",description:"Form fields with multiple labels can be confusingly announced by assistive technologies like screen readers which use either the first, the last, or all of the labels. [Learn how to use form labels](https://dequeuniversity.com/rules/axe/4.10/form-field-multiple-labels).",score:null,scoreDisplayMode:"notApplicable"},"frame-title":{id:"frame-title",title:"`<frame>` or `<iframe>` elements have a title",description:"Screen reader users rely on frame titles to describe the contents of frames. [Learn more about frame titles](https://dequeuniversity.com/rules/axe/4.10/frame-title).",score:null,scoreDisplayMode:"notApplicable"},"heading-order":{id:"heading-order",title:"Heading elements appear in a sequentially-descending order",description:"Properly ordered headings that do not skip levels convey the semantic structure of the page, making it easier to navigate and understand when using assistive technologies. [Learn more about heading order](https://dequeuniversity.com/rules/axe/4.10/heading-order).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"html-has-lang":{id:"html-has-lang",title:"`<html>` element has a `[lang]` attribute",description:"If a page doesn't specify a `lang` attribute, a screen reader assumes that the page is in the default language that the user chose when setting up the screen reader. If the page isn't actually in the default language, then the screen reader might not announce the page's text correctly. [Learn more about the `lang` attribute](https://dequeuniversity.com/rules/axe/4.10/html-has-lang).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"html-lang-valid":{id:"html-lang-valid",title:"`<html>` element has a valid value for its `[lang]` attribute",description:"Specifying a valid [BCP 47 language](https://www.w3.org/International/questions/qa-choosing-language-tags#question) helps screen readers announce text properly. [Learn how to use the `lang` attribute](https://dequeuniversity.com/rules/axe/4.10/html-lang-valid).",score:1,scoreDisplayMode:"binary",details:{type:"table",headings:[],items:[]}},"html-xml-lang-mismatch":{id:"html-xml-lang-mismatch",title:"`<html>` element has an `[xml:lang]` attribute with the same base language as the `[lang]` attribute.",description:"If the webpage does not specify a consistent language, then the screen reader might not announce the page's text correctly. [Learn more about the `lang` attribute](https://dequeuniversity.com/rules/axe/4.10/html-xml-lang-mismatch).",score:null,scoreDisplayMode:"notApplicable"},"identical-links-same-purpose":{id:"identical-links-same-purpose",title:"Identical links have the same purpose.",description:"Links with the same destination should have the same description, to help users understand the link's purpose and decide whether to follow it. [Learn more about identical links](https://dequeuniversity.com/rules/axe/4.10/identical-links-same-purpose).",score:1,scoreDisplayMode:"informative",details:{type:"table",headings:[{key:"node",valueType:"node",subItemsHeading:{key:"relatedNode",valueType:"node"},label:"Failing Elements"}],items:[{node:{type:"node",lhId:"1-6-A",path:"1,HTML,1,BODY,3,HEADER,8,DIV,0,A",selector:"body > header > div.key-badges > a",boundingRect:{top:1447,bottom:1469,left:131,right:281,width:150,height:22},snippet:'<a href="https://api.securityscorecards.dev/projects/github.com/Hack23/homepage">',nodeLabel:"OpenSSF Scorecard",explanation:"Fix all of the following:\n  Check that links have the same purpose, or are intentionally ambiguous."},subItems:{type:"subitems",items:[{relatedNode:{type:"node",lhId:"1-7-A",path:"1,HTML,1,BODY,4,MAIN,0,SECTION,5,DIV,0,TABLE,1,TBODY,0,TR,2,TD,0,A",selector:"tbody > tr > td > a",boundingRect:{top:6362,bottom:6382,left:541,right:621,width:80,height:20},snippet:'<a href="https://scorecard.dev/viewer/?uri=github.com/Hack23/riksdagsmonitor" target="_blank" rel="noopener">',nodeLabel:"OpenSSF Scorecard"}},{relatedNode:{type:"node",lhId:"1-8-A",path:"1,HTML,1,BODY,4,MAIN,0,SECTION,5,DIV,0,TABLE,1,TBODY,1
