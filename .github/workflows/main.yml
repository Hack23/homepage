name: Verify and Deploy
on:
  push:
    branches:
      - master
permissions: write-all

env:
  AWS_REGION : "us-east-1"
  AWS_REGION_ZONE : "us-east-1"
  S3_BUCKET_NAME: "hack23-frontend-us-east-1-172017021075"
  CLOUDFRONT_STACK_NAME: "hack23-frontend"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            accounts.google.com:443
            amazon-cloudfront-secure-static-site-s3bucketroot-14oliw5cmta06.s3.us-east-1.amazonaws.com:443
            api.github.com:443
            api.securityscorecards.dev:443
            app.fossa.io:443
            auth.docker.io:443
            bestpractices.coreinfrastructure.org:443
            cfu.zaproxy.org:443
            cla-assistant.io:443
            cla-assistant.io:80
            clients2.google.com:80
            cloudformation.us-east-1.amazonaws.com:443
            cloudfront.amazonaws.com:443
            content-signature-2.cdn.mozilla.net:443
            deb.debian.org:80
            firefox-settings-attachments.cdn.mozilla.net:443
            firefox.settings.services.mozilla.com:443
            fonts.googleapis.com:443
            fonts.gstatic.com:443
            ghcr.io:443
            github.com:443
            hack23.com:443
            hack23.com:80
            hack23.comnull:443
            img.shields.io:443
            isitmaintained.com:443
            isitmaintained.com:80
            location.services.mozilla.com:443
            news.zaproxy.org:443
            objects.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            production.cloudflare.docker.com:443
            r10.o.lencr.org:443
            r11.o.lencr.org:80
            raw.githubusercontent.com:443
            registry-1.docker.io:443
            registry.npmjs.org:443
            safebrowsingohttpgateway.googleapis.com:443
            shavar.services.mozilla.com:443
            slsa.dev:443
            sonarcloud.io:443
            storage.googleapis.com:443
            sts.us-east-1.amazonaws.com:443
            tel.zaproxy.org:443
            tracking-protection.cdn.mozilla.net:443
            us-central1-lighthouse-infrastructure.cloudfunctions.net:443
            www.google.com:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('**/.github/workflows/main.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Cache npm dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-minify-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-minify-
            ${{ runner.os }}-npm-

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::172017021075:role/GithubWorkFlowRole
          role-session-name: githubworkflowrolesessiont2
          aws-region: ${{ env.AWS_REGION }}
      - name: Minify Action
        uses: dra1ex/minify-action@3c54a82e092a78c827659385d1be715126f13410 # v1.0.3
      - name: Deploy to S3 with proper cache headers
        run: |
          echo "🚀 Starting cost-optimized S3 deployment..."
          echo "ℹ️  Using --size-only to skip unchanged files (avoids full re-upload on every deploy)"
          echo "ℹ️  Reduced from 6 sync passes to 2 (minimizes ListObjects + PutObject API calls)"
          
          # Common excludes: files that should never be deployed to S3
          # Build/dev tooling, documentation source, scripts, config files
          EXCLUDES=(
            --exclude ".git/*"
            --exclude ".github/*"
            --exclude ".devcontainer/*"
            --exclude ".vscode/*"
            --exclude ".lighthouseci/*"
            --exclude "node_modules/*"
            --exclude "__pycache__/*"
            --exclude "optimized-images/*"
            --exclude "*.md"
            --exclude "*.py"
            --exclude "*.sh"
            --exclude "*.backup*"
            --exclude "package.json"
            --exclude "package-lock.json"
            --exclude "budget.json"
            --exclude ".htmlhintrc"
            --exclude ".force-ci-refresh"
            --exclude "CODEOWNERS"
            --exclude "techstack.yml"
            --exclude "translation-config.json"
            --exclude ".project"
          )
          
          # Pass 1: Sync all non-HTML files (static assets) with immutable long cache
          # Uses --size-only: only uploads files whose size differs from S3
          # This prevents re-uploading ~2000+ unchanged assets on every deploy
          # No --delete: preserves legacy asset URLs on S3 that may no longer be in repo
          echo "📦 Pass 1/2: Syncing static assets (JS, CSS, images, fonts, PDFs, etc.)..."
          aws s3 sync . s3://${{ env.S3_BUCKET_NAME }}/ \
            "${EXCLUDES[@]}" \
            --exclude "*.html" \
            --size-only \
            --no-progress \
            --cache-control "public, max-age=31536000, immutable"
          
          # Pass 2: Sync HTML files with short cache (1 hour)
          # Uses --size-only: HTML files only re-upload when content actually changes
          # No --delete: preserves legacy HTML pages on S3 for URL permanence
          echo "📄 Pass 2/2: Syncing HTML files..."
          aws s3 sync . s3://${{ env.S3_BUCKET_NAME }}/ \
            "${EXCLUDES[@]}" \
            --exclude "*" \
            --include "*.html" \
            --size-only \
            --no-progress \
            --cache-control "public, max-age=3600, must-revalidate" \
            --content-type "text/html; charset=utf-8"
          
          echo "✅ S3 deployment completed (2 sync passes, size-only comparison)"
          echo "ℹ️  Legacy URLs preserved (no --delete flag)"
          echo "ℹ️  Only size-changed files uploaded (minimal CloudTrail events)"

      # Invalidate CloudFront cache to ensure latest content is served
      - name: Invalidate CloudFront
        run: |
          echo "🔍 Discovering CloudFront distribution ID from stack: ${{ env.CLOUDFRONT_STACK_NAME }}"
          CloudFrontDistId=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.CLOUDFRONT_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text 2>/dev/null || echo "")
          
          if [ -z "$CloudFrontDistId" ]; then
            echo "⚠️  Warning: CloudFront distribution ID not found in stack outputs"
            echo "Attempting to find distribution by S3 origin domain..."
            # List all distributions and filter by S3 bucket origin
            CloudFrontDistId=$(aws cloudfront list-distributions \
              --output json 2>/dev/null | \
              jq -r ".DistributionList.Items[] | select(.Origins.Items[].DomainName | contains(\"${{ env.S3_BUCKET_NAME }}\")) | .Id" | \
              head -n 1 || echo "")
          fi
          
          if [ -z "$CloudFrontDistId" ] || [ "$CloudFrontDistId" = "None" ]; then
            echo "❌ Error: Could not discover CloudFront distribution ID"
            exit 1
          fi
          
          echo "✅ Found CloudFront distribution: $CloudFrontDistId"
          echo "🔄 Creating cache invalidation for all paths..."
          
          aws cloudfront create-invalidation \
            --distribution-id $CloudFrontDistId \
            --paths "/*"
          
          echo "✅ CloudFront cache invalidation completed"

      - name: Audit URLs using Lighthouse
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v9
        with:
          urls: |
            https://hack23.com/
          budgetPath: ./budget.json # test performance budgets
          uploadArtifacts: true # save results as an action artifacts
          temporaryPublicStorage: true # upload lighthouse report to the temporary storage
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c # v0.13.0
        with:
          token: ${{ github.token }}
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          target: 'https://hack23.com/'
