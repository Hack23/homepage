name: Compile Agentic Workflows

# Compile .md workflow files to .lock.yml and commit all generated artifacts.
# SHARED_PROMPT_PATTERNS.md lives in .github/aw/ (not workflows/) so bare
# `gh aw compile` works without exclusions.

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  compile:
    name: Compile Agentic Workflows
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.COPILOT_MCP_GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25'

      - name: Install gh-aw CLI
        run: |
          # Pin to a specific version to prevent regressions from buggy releases.
          # v0.67.4 introduced GITHUB_COPILOT_INTEGRATION_ID which broke all workflows;
          # v0.68.0 fixes this. Update this pin when upgrading gh-aw.
          GH_AW_VERSION="v0.68.7"
          gh extension install github/gh-aw --pin "$GH_AW_VERSION"
        env:
          GH_TOKEN: ${{ secrets.COPILOT_MCP_GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Delete existing lock files
        run: find .github/workflows -name "*.lock.yml" -type f -delete

      - name: Compile all workflows
        run: gh aw compile
        env:
          GH_TOKEN: ${{ secrets.COPILOT_MCP_GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit all generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/*.lock.yml \
                  .github/workflows/agentics-maintenance.yml \
                  .github/aw/actions-lock.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git diff --cached --stat
            git commit -m "chore: recompile agentic workflow lock files"
            git push
          fi
