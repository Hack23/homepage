name: Compile Agentic Workflows

on:
  push:
    paths:
      - '.github/workflows/*.md'
  pull_request:
    paths:
      - '.github/workflows/*.md'
  workflow_dispatch:
    inputs:
      compile_mode:
        description: 'Compilation mode'
        required: false
        default: 'check'
        type: choice
        options:
          - check
          - compile

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup GitHub CLI
        run: gh --version
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install gh-aw extension
        run: gh extension install github/gh-aw
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate agentic workflow markdown files
        run: |
          echo "🔍 Validating agentic workflow files..."
          ERRORS=0

          for workflow in .github/workflows/*.md; do
            [ -f "$workflow" ] || continue
            echo ""
            echo "📄 Checking: $workflow"

            # Check for required YAML frontmatter
            if ! head -1 "$workflow" | grep -q '^---$'; then
              echo "  ❌ Missing YAML frontmatter opening ---"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Check for frontmatter closing
            if ! awk 'NR>1 && /^---$/{found=1; exit} END{exit !found}' "$workflow"; then
              echo "  ❌ Missing YAML frontmatter closing ---"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Extract frontmatter
            FRONTMATTER=$(awk '/^---$/{n++; next} n==1{print}' "$workflow")

            # Check for required on: trigger
            if ! echo "$FRONTMATTER" | grep -q '^on:'; then
              echo "  ❌ Missing 'on:' trigger definition"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✅ Has trigger definition"
            fi

            # Check for permissions
            if ! echo "$FRONTMATTER" | grep -q '^permissions:'; then
              echo "  ❌ Missing 'permissions:' definition"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✅ Has permissions definition"
            fi

            # Check for safe-outputs (required for workflows with write operations)
            if echo "$FRONTMATTER" | grep -q 'safe-outputs:'; then
              echo "  ✅ Has safe-outputs configuration"

              # Check for threat-detection in safe-outputs
              if echo "$FRONTMATTER" | grep -q 'threat-detection:'; then
                echo "  ✅ Has threat-detection enabled"
              else
                echo "  ⚠️  Missing threat-detection in safe-outputs"
              fi
            fi

            # Check for timeout
            if echo "$FRONTMATTER" | grep -q 'timeout-minutes:'; then
              echo "  ✅ Has timeout configuration"
            else
              echo "  ⚠️  Missing timeout-minutes (recommended)"
            fi

            echo "  ✅ Frontmatter structure valid"
          done

          echo ""
          if [ $ERRORS -gt 0 ]; then
            echo "❌ Found $ERRORS validation error(s)"
            exit 1
          else
            echo "✅ All agentic workflow files passed validation"
          fi

      - name: Compile agentic workflows
        run: |
          echo "⚙️ Compiling agentic workflows..."
          MODE="${{ inputs.compile_mode || 'check' }}"

          if [ "$MODE" = "check" ]; then
            echo "Running in check mode (validation only)..."
            gh aw compile --check || {
              echo "❌ Compilation check failed. Run 'gh aw compile' locally to fix."
              exit 1
            }
          else
            echo "Running in compile mode..."
            gh aw compile || {
              echo "❌ Compilation failed."
              exit 1
            }
          fi

          echo "✅ Agentic workflow compilation complete"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify lock files are current
        if: github.event_name == 'pull_request'
        run: |
          echo "🔒 Checking lock file status..."
          STALE=0

          for workflow in .github/workflows/*.md; do
            [ -f "$workflow" ] || continue
            LOCK="${workflow%.md}.lock.yml"

            if [ -f "$LOCK" ]; then
              echo "  ✅ Lock file exists: $LOCK"
            else
              echo "  ℹ️ No lock file for: $workflow (will be generated on first compile)"
            fi
          done

          if [ -n "$(git status --porcelain .github/workflows/*.lock.yml 2>/dev/null)" ]; then
            echo ""
            echo "⚠️ Lock files may be out of date."
            echo "Run 'gh aw compile' locally and commit the updated .lock.yml files."
          fi
