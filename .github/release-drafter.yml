name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features & Enhancements'
    labels:
      - 'feature'
      - 'enhancement'

  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'

  - title: '🏗️ Infrastructure & DevOps'
    labels:
      - 'infrastructure'
      - 'deployment'

  - title: '🔒 Security & Compliance'
    labels:
      - 'security'
      - 'compliance'

  - title: '♿ Accessibility'
    labels:
      - 'accessibility'

  - title: '🌐 Internationalization'
    labels:
      - 'i18n'

  - title: '🎨 UI/UX Improvements'
    labels:
      - 'ui'

  - title: '⚡ Performance'
    labels:
      - 'performance'

  - title: '📚 Documentation'
    labels:
      - 'documentation'

  - title: '🔄 Code Quality & Refactoring'
    labels:
      - 'refactor'
      - 'quality-checks'

  - title: '📦 Dependencies'
    labels:
      - 'dependencies'

  - title: '🤖 GitHub Copilot & AI'
    labels:
      - 'copilot'
      - 'agents'
      - 'skills'

  - title: '🔍 Content & SEO'
    labels:
      - 'content-blog'
      - 'content-pages'
      - 'content-projects'
      - 'content-services'
      - 'seo'

  - title: '🎯 Specific Areas'
    labels:
      - 'area-blacktrigram'
      - 'area-cia'
      - 'area-compliance'
      - 'area-homepage'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.

exclude-labels:
  - 'duplicate'
  - 'invalid'
  - 'wontfix'
version-resolver:
  major:
    labels: []
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'security'
      - 'dependencies'
  default: patch

autolabeler:
  - label: 'feature'
    title:
      - '/^feat(\([^)]+\))?:/i'
  - label: 'bug'
    title:
      - '/^fix(\([^)]+\))?:/i'
  - label: 'documentation'
    title:
      - '/^docs(\([^)]+\))?:/i'
  - label: 'enhancement'
    title:
      - '/^enhance(\([^)]+\))?:/i'
  - label: 'dependencies'
    title:
      - '/^build\(deps\):/i'
  - label: 'security'
    title:
      - '/^security(\([^)]+\))?:/i'
  - label: 'performance'
    title:
      - '/^perf(\([^)]+\))?:/i'
  - label: 'refactor'
    title:
      - '/^refactor(\([^)]+\))?:/i'
  - label: 'infrastructure'
    title:
      - '/^ci(\([^)]+\))?:/i'
      - '/^cd(\([^)]+\))?:/i'

template: |
  # Highlights
  
  $CHANGES
  
  ## 🏆 Hack23 Quality & Security Badges
  
  [![SLSA 3](https://slsa.dev/images/gh-badge-level3.svg)](https://github.com/Hack23/homepage/attestations/)
  [![OpenSSF Scorecard](https://api.securityscorecards.dev/projects/github.com/Hack23/homepage/badge)](https://scorecard.dev/viewer/?uri=github.com/Hack23/homepage)
  [![CLA assistant](https://cla-assistant.io/readme/badge/Hack23/homepage)](https://cla-assistant.io/Hack23/homepage)
  
  ### 📋 ISMS Public Policies
  
  Hack23 is committed to transparency and evidence-based security. All policies are publicly available:
  
  [![ISMS Public](https://img.shields.io/badge/ISMS-PUBLIC-0066CC?style=for-the-badge&logo=github&logoColor=white)](https://github.com/Hack23/ISMS-PUBLIC)
  [![Information Security Policy](https://img.shields.io/badge/Security-Policy-DC143C?style=for-the-badge&logo=shield&logoColor=white)](https://github.com/Hack23/ISMS-PUBLIC/blob/main/Information_Security_Policy.md)
  [![Open Source Policy](https://img.shields.io/badge/Open_Source-Policy-28A745?style=for-the-badge&logo=opensource&logoColor=white)](https://github.com/Hack23/ISMS-PUBLIC/blob/main/Open_Source_Policy.md)
  [![Secure Development Policy](https://img.shields.io/badge/Secure-Development-667eea?style=for-the-badge&logo=codesandbox&logoColor=white)](https://github.com/Hack23/ISMS-PUBLIC/blob/main/Secure_Development_Policy.md)
  
  ## 📊 Quality & Security Reports
  
  This release includes comprehensive quality assurance and security validation:
  
  ### 🔒 Supply Chain Security (SLSA Build Level 3)
  - ✅ **Build Provenance Attestation:** [View Attestations](https://github.com/Hack23/homepage/attestations/)
  - 📦 **SBOM (SPDX format):** `homepage-v$RESOLVED_VERSION.spdx.json`
  - 🔐 **GitHub OIDC Signing:** Ephemeral credentials, no long-lived secrets
  - 🛡️ **Tag-Triggered Parameterless Builds:** Reproducible builds from source tags (workflow_dispatch allows version parameter input)
  
  ### 🧪 Test & Quality Reports (docs/ directory)
  - ✅ **[HTML Validation](https://github.com/Hack23/homepage/blob/v$RESOLVED_VERSION/docs/html-validation.txt):** W3C standards compliance
  - ⚡ **[Lighthouse Audit](https://github.com/Hack23/homepage/blob/v$RESOLVED_VERSION/docs/lighthouse-summary.html):** Performance, SEO, Best Practices
  - ♿ **[Accessibility Report](https://github.com/Hack23/homepage/blob/v$RESOLVED_VERSION/docs/accessibility-report.html):** WCAG 2.1 AA compliant (Score: 100)
  - 🔒 **[Security Scan](https://github.com/Hack23/homepage/blob/v$RESOLVED_VERSION/docs/security-report.html):** OWASP ZAP full scan
  - 📚 **[Documentation Viewer](https://github.com/Hack23/homepage/blob/v$RESOLVED_VERSION/docs/index.html):** Comprehensive quality dashboard
  
  ### 📈 Quality Metrics
  - **Lighthouse Performance:** > 90
  - **Lighthouse Accessibility:** 100 (WCAG 2.1 AA)
  - **Lighthouse SEO:** 100
  - **Lighthouse Best Practices:** 100
  - **HTML Validation:** Pass (W3C)
  - **Security Score:** OpenSSF Scorecard tracked
  
  ### 🌐 Deployment Targets
  - **Primary:** https://hack23.com (AWS S3 + CloudFront)
  - **Backup:** https://hack23.github.io/homepage/ (GitHub Pages)
  - **Node.js Version:** 26 (Current)
  
  ## 🔐 Verify Release Artifacts
  
  ### Verify Build Attestations
  ```bash
  # Install GitHub CLI (gh) if not already installed
  # Download and verify the release artifact
  gh attestation verify homepage-v$RESOLVED_VERSION.zip --owner Hack23
  ```
  
  ### View SBOM (Software Bill of Materials)
  ```bash
  # Download the SBOM from release assets
  gh release download v$RESOLVED_VERSION --repo Hack23/homepage --pattern "homepage-v$RESOLVED_VERSION.spdx.json"
  
  # View SBOM in JSON format
  cat homepage-v$RESOLVED_VERSION.spdx.json | jq
  
  # Extract package list from SBOM
  cat homepage-v$RESOLVED_VERSION.spdx.json | jq '.packages[] | {name, version}'
  ```
  
  ### Verify Release Signature
  ```bash
  # Verify the release was signed with GitHub's OIDC provider
  gh attestation verify homepage-v$RESOLVED_VERSION.zip \
    --owner Hack23 \
    --signer-workflow Hack23/homepage/.github/workflows/release.yml
  ```
  
  ## 🙏 Contributors
  
  Thanks to $CONTRIBUTORS for their contributions to this release!
  
  ---
  
  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
